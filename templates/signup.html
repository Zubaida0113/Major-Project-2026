<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicVoice AI - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .signup-card {
            background: #181d2a;
            border-radius: 1.5rem;
            border: 2px solid #2d3a5a;
            box-shadow: 0 4px 32px 0 rgba(35, 41, 70, 0.18);
            padding: 2.5rem 2rem 2rem 2rem;
            max-width: 420px;
            margin: 3rem auto 0 auto;
            color: #fff;
        }

        .form-label {
            color: #a3adc2;
            font-weight: 500;
        }

        .form-control {
            background: #232946;
            color: #fff;
            border: 1.5px solid #2d3a5a;
        }

        .form-control:focus {
            border-color: #4f8cff;
            box-shadow: none;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.98rem;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="container vh-100 d-flex flex-column align-items-center justify-content-center">
        <div class="signup-card w-100">
            <div class="d-flex align-items-center justify-content-center mb-4">
                <span class="logo-img-wrapper me-2">
                    <img src="/assets/wave-sound.png" alt="CivicVoice Logo" width="40" height="40">
                </span>
                <h3 class="fw-bold mb-0">CivicVoice AI</h3>
            </div>
            <form id="signupForm" autocomplete="off" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" required>
                    <div class="error-msg" id="nameError"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required>
                    <div class="error-msg" id="emailError"></div>
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Home Address</label>
                    <input type="text" class="form-control" id="address" required>
                    <div class="error-msg" id="addressError"></div>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" required pattern="^[0-9\-\+\s()]{10,15}$">
                    <div class="error-msg" id="phoneError"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-2">Sign Up &rarr;</button>
            </form>
        </div>
    </div>
    <script>
        // Client-side validation and local persistence
        const form = document.getElementById('signupForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const addressInput = document.getElementById('address');
        const phoneInput = document.getElementById('phone');
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const addressError = document.getElementById('addressError');
        const phoneError = document.getElementById('phoneError');

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        function validatePhone(phone) {
            return /^[0-9\-\+\s()]{10,15}$/.test(phone);
        }
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            let valid = true;
            nameError.textContent = '';
            emailError.textContent = '';
            addressError.textContent = '';
            phoneError.textContent = '';
            if (!nameInput.value.trim()) {
                nameError.textContent = 'Please enter your full name.';
                valid = false;
            }
            if (!emailInput.value.trim() || !validateEmail(emailInput.value.trim())) {
                emailError.textContent = 'Please enter a valid email address.';
                valid = false;
            }
            if (!addressInput.value.trim()) {
                addressError.textContent = 'Please enter your home address.';
                valid = false;
            }
            if (!phoneInput.value.trim() || !validatePhone(phoneInput.value.trim())) {
                phoneError.textContent = 'Please enter a valid phone number.';
                valid = false;
            }
            if (valid) {
                // Save to localStorage as persistent JSON
                const userData = {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    address: addressInput.value.trim(),
                    phone: phoneInput.value.trim()
                };
                localStorage.setItem('civicvoice_user', JSON.stringify(userData));
                // Redirect to verification page
                window.location.href = 'resident-dashboard.html';

            }
        });
    </script>
</body>
</html>
